<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ONZE</title>
<meta name="description" content="ONZE Sports — a boutique football talent management firm. Caribbean roots, Dutch soil.">
<!-- private pitch: keep out of search indexes until ONZE decides otherwise -->
<meta name="robots" content="noindex,nofollow">
<!-- og:image/og:url are absolute (deployed at www.onzesite.com, GitHub Pages, 2026-07-13) —
     link scrapers (WhatsApp/iMessage/Slack) ignore relative image paths. See DEPLOY.md. -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.onzesite.com/">
<meta property="og:title" content="ONZE">
<meta property="og:description" content="ONZE Sports — a boutique football talent management firm. Caribbean roots, Dutch soil.">
<meta property="og:image" content="https://www.onzesite.com/assets/og/og-onze.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="assets/og/favicon-onze.png">
<link rel="apple-touch-icon" href="assets/og/apple-touch-onze.png">
<!-- everything local: fonts vendored (see assets/vendor/fonts/fonts.css) and NO script libraries
     at all — the exit wipe below is pure CSS transitions, so this page can never have a dead
     CTA from a missing CDN again (the old GSAP-from-cdnjs version threw on click when offline,
     after preventDefault had already eaten the navigation). Prefetch warms the deck + its
     poster while the Chairman reads the greeting. -->
<link rel="stylesheet" href="assets/vendor/fonts/fonts.css">
<link rel="stylesheet" href="theme/onze-tokens.css">
<link rel="prefetch" href="collective-xi.html">
<link rel="prefetch" href="assets/imagery/optimized/cold-open-poster.webp">
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    background: var(--color-ground);
    overflow: hidden;
  }

  .icon-stack {
    --icon-big: clamp(140px, 32vmin, 260px);

    position: fixed;
    top: 50%;
    left: 50%;
    width: var(--icon-big);
    height: var(--icon-big);
    transform: translate(-50%, -50%);
    animation: icon-fade-out 800ms ease-out 1400ms forwards;
  }

  @keyframes icon-fade-out {
    to { opacity: 0; }
  }

  .icon-stack img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }

  .icon-stack img.layer-1 { animation: flash 1750ms 0ms forwards; }
  .icon-stack img.layer-2 { animation: flash 1750ms 350ms forwards; }
  .icon-stack img.layer-3 { animation: flash 1750ms 700ms forwards; }
  .icon-stack img.layer-4 { animation: flash 1750ms 1050ms forwards; }
  .icon-stack img.layer-5 { animation: flash-in 100ms 1400ms forwards; }

  @keyframes flash {
    0%     { opacity: 1; }
    20%    { opacity: 1; }
    20.01% { opacity: 0; }
    100%   { opacity: 0; }
  }

  @keyframes flash-in {
    0%     { opacity: 0; }
    0.02%  { opacity: 1; }
    100%   { opacity: 1; }
  }

  .logo-stack {
    position: fixed;
    top: clamp(16px, 4vmin, 40px);
    left: clamp(16px, 4vmin, 40px);
    height: clamp(28px, 7vmin, 56px);
    aspect-ratio: 1598 / 467;
  }

  .logo-stack img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }

  .logo-stack img.layer-1 { animation: flash 1750ms 2200ms forwards; }
  .logo-stack img.layer-2 { animation: flash 1750ms 2550ms forwards; }
  .logo-stack img.layer-3 { animation: flash 1750ms 2900ms forwards; }
  .logo-stack img.layer-4 { animation: flash 1750ms 3250ms forwards; }
  .logo-stack img.layer-5 { animation: flash-in 100ms 3600ms forwards; }

  @media (prefers-reduced-motion: reduce) {
    .icon-stack { display: none; }
    .logo-stack img { animation: none; opacity: 0; }
    .logo-stack img.layer-5 { opacity: 1; }
  }

  .typewriter {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(90vw, 42ch);
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: clamp(14px, 2.2vw, 19px);
    line-height: 1.7;
    color: var(--color-ink);
  }

  .tw-target { margin: 0; min-height: 1.7em; }

  .tw-cta { margin-top: 0.5em; }

  .tw-link {
    display: inline-block;
    color: var(--color-ember);
    text-decoration: none;
    border-bottom: 1.5px solid transparent;
    pointer-events: none;
  }

  /* ---- the exit: ONZE's diagonal-cut card edge, turned into motion. Five skewed panels
     sweep across in the fixed accent order (Ember → Ochre → Brass → Indigo), and the last
     lands Pitch green — the one deliberate cross-system color, the bridge INTO Collective XI
     (the deck opens under a matching green cover that fades; see collective-xi.html's
     .arrival-cover). Oversized + skewX(-14deg) so the leading edge is the brand diagonal. ---- */
  .wipe {
    position: fixed;
    top: -10vh;
    bottom: -10vh;
    left: -40vw;
    width: 180vw;
    transform: translateX(-190vw) skewX(-14deg);
    pointer-events: none;
    z-index: 1000;
  }
  .wipe.sweep { transition: transform .55s cubic-bezier(.7, .05, .25, 1); transform: translateX(-20vw) skewX(-14deg); }
  .w1 { background: var(--color-ember); }
  .w2 { background: var(--color-ochre); }
  .w3 { background: var(--color-brass); }
  .w4 { background: var(--color-indigo); }
  .w5 { background: #1F5C3F; } /* Collective XI Pitch — the landing color, not an ONZE token */

  /* the old GSAP back.out link pop, as a one-shot CSS keyframe added on click */
  .tw-link.pop { animation: cta-pop .45s cubic-bezier(.34, 1.56, .64, 1); }
  @keyframes cta-pop { 35% { transform: scale(1.08); } 100% { transform: scale(1); } }

  .tw-link.tw-active {
    pointer-events: auto;
    cursor: pointer;
    border-bottom-color: var(--color-ember);
  }

  .tw-link.tw-active:hover { color: var(--color-ochre); border-bottom-color: var(--color-ochre); }

  .tw-cursor {
    display: inline-block;
    margin-left: 1px;
    animation: tw-blink 1s steps(1) infinite;
  }

  @keyframes tw-blink { 50% { opacity: 0; } }

  @media (prefers-reduced-motion: reduce) {
    .tw-cursor { display: none; }
  }

  /* the greeting takes ~25s to type — impatient or returning viewers can skip (see script).
     Hint arrives quietly once the typing rhythm is established, leaves when typing ends. */
  .tw-skip-hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .06em;
    color: rgba(20, 23, 15, .45);
    opacity: 0;
    animation: hint-in .6s ease 2.5s forwards;
    pointer-events: none;
  }
  @keyframes hint-in { to { opacity: 1; } }
  .tw-skip-hint.gone { display: none; }
  @media (prefers-reduced-motion: reduce) {
    .tw-skip-hint { display: none; }
  }
</style>
</head>
<body>
  <div class="icon-stack">
    <img class="layer-1" src="assets/generated/icon-flash/onze-icon-ember.png" alt="">
    <img class="layer-2" src="assets/generated/icon-flash/onze-icon-ochre.png" alt="">
    <img class="layer-3" src="assets/generated/icon-flash/onze-icon-brass.png" alt="">
    <img class="layer-4" src="assets/generated/icon-flash/onze-icon-indigo.png" alt="">
    <img class="layer-5" src="assets/brand/logo/icon/onze-icon-black.png" alt="">
  </div>
  <div class="logo-stack">
    <img class="layer-1" src="assets/generated/icon-flash/onze-horizontal-ember.png" alt="">
    <img class="layer-2" src="assets/generated/icon-flash/onze-horizontal-ochre.png" alt="">
    <img class="layer-3" src="assets/generated/icon-flash/onze-horizontal-brass.png" alt="">
    <img class="layer-4" src="assets/generated/icon-flash/onze-horizontal-indigo.png" alt="">
    <img class="layer-5" src="assets/brand/logo/horizontal/onze-horizontal-black.png" alt="ONZE">
  </div>

  <div class="typewriter" aria-live="polite">
    <p class="tw-target" data-text="Hello there, Elvis."></p>
    <p class="tw-target" data-text="We want to present you with something..."></p>
    <p class="tw-target" data-text="It's called Collective XI."></p>
    <p class="tw-target" data-text="A football federation cooperative ran by you and your peers."></p>
    <p class="tw-target" data-text="Together, preparing a brand new football journey."></p>
    <p class="tw-target" data-text="And guess what...."></p>
    <p class="tw-target" data-text="We see you leading the way."></p>
    <p class="tw-cta"><a href="collective-xi.html" class="tw-target tw-link" tabindex="-1" data-text="Press here to enter."></a></p>
  </div>

  <p class="tw-skip-hint" id="skipHint">click anywhere to skip</p>

  <div class="wipe w1"></div>
  <div class="wipe w2"></div>
  <div class="wipe w3"></div>
  <div class="wipe w4"></div>
  <div class="wipe w5"></div>

<script>
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var targets = Array.prototype.slice.call(document.querySelectorAll('.tw-target'));
  var link = document.querySelector('.tw-link');

  function activateLink() {
    link.removeAttribute('tabindex');
    link.classList.add('tw-active');
  }

  var skipHint = document.getElementById('skipHint');
  var typingDone = false;

  function renderAllInstant() {
    typingDone = true;
    targets.forEach(function (el) { el.textContent = el.getAttribute('data-text'); });
    activateLink();
    if (skipHint) skipHint.classList.add('gone');
    try { sessionStorage.setItem('onze-typed', '1'); } catch (err) {}
  }

  var alreadyGreeted = false;
  try { alreadyGreeted = !!sessionStorage.getItem('onze-typed'); } catch (err) {}

  if (reduceMotion || alreadyGreeted) {
    // reduced-motion viewers and RETURNING visitors (e.g. back from the deck) get the greeting
    // instantly — nobody sits through the 25s typewriter twice.
    renderAllInstant();
  } else {
    var cursor = document.createElement('span');
    cursor.className = 'tw-cursor';
    cursor.textContent = '|';

    // Parallel to `targets`: index of a character to "mistype" and correct, or null for a clean line.
    var typoIndices = [1, null, null, 4, null, null, 13, null];

    var neighbors = {
      a: 's', b: 'v', c: 'x', d: 's', e: 'w', f: 'd', g: 'f', h: 'g', i: 'o', j: 'k',
      k: 'j', l: 'k', m: 'n', n: 'm', o: 'i', p: 'o', q: 'w', r: 'e', s: 'a', t: 'r',
      u: 'y', v: 'c', w: 'e', x: 'c', y: 'u', z: 'x'
    };

    function typoFor(ch) {
      var lower = ch.toLowerCase();
      var swap = neighbors[lower];
      if (!swap) return ch;
      return ch === lower ? swap : swap.toUpperCase();
    }

    function buildFrames(text, typoAt) {
      var frames = [];
      var current = '';
      for (var i = 0; i < text.length; i++) {
        if (i === typoAt) {
          current += typoFor(text[i]);
          frames.push({ text: current, delay: 400 });
          current = current.slice(0, -1);
          frames.push({ text: current, delay: 200 });
        }
        current += text[i];
        frames.push({ text: current, delay: 65 });
      }
      return frames;
    }

    function typeLine(index) {
      if (typingDone) return; // a skip finished everything already
      if (index >= targets.length) {
        typingDone = true;
        activateLink();
        targets[targets.length - 1].appendChild(cursor);
        if (skipHint) skipHint.classList.add('gone');
        try { sessionStorage.setItem('onze-typed', '1'); } catch (err) {}
        return;
      }
      var el = targets[index];
      var text = el.getAttribute('data-text');
      var frames = buildFrames(text, typoIndices[index]);
      var frameIndex = 0;

      function playFrame() {
        if (typingDone) return;
        if (frameIndex >= frames.length) {
          setTimeout(function () { typeLine(index + 1); }, 600);
          return;
        }
        var frame = frames[frameIndex];
        el.textContent = frame.text;
        el.appendChild(cursor);
        frameIndex++;
        setTimeout(playFrame, frame.delay);
      }
      playFrame();
    }

    setTimeout(function () { typeLine(0); }, 3700);

    // click/tap/keypress anywhere fast-forwards the whole greeting (the CTA's own click still
    // navigates — it's only clickable once active, at which point typing is already done)
    function skipTyping() {
      if (typingDone) return;
      if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
      renderAllInstant();
    }
    document.addEventListener('click', function (e) {
      if (e.target.closest('.tw-link')) return;
      skipTyping();
    });
    document.addEventListener('keydown', skipTyping);
  }

  link.addEventListener('click', function (e) {
    e.preventDefault();
    var href = link.getAttribute('href');

    if (reduceMotion) {
      window.location.href = href;
      return;
    }

    // whatever happens below, the click must always end in navigation — the previous version
    // died silently offline when its CDN library was missing.
    try {
      // tells the deck to open under a Pitch-green cover that fades (arrival handoff)
      sessionStorage.setItem('cxi-from-onze', '1');
      link.classList.add('pop');

      var panels = document.querySelectorAll('.wipe');
      panels.forEach(function (p, i) {
        setTimeout(function () { p.classList.add('sweep'); }, 60 + i * 95);
      });
      // navigate ~250ms after the green panel has fully covered the screen
      setTimeout(function () { window.location.href = href; }, 60 + 4 * 95 + 550 + 250);
    } catch (err) {
      window.location.href = href;
    }
  });
</script>
</body>
</html>
