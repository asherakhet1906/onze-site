<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ONZE — Players</title>
<meta name="description" content="ONZE Sports Management — Players. Coming soon.">
<link rel="icon" href="assets/brand/favicon/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system/tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; height:100dvh; overflow:hidden; overscroll-behavior:none; }
  body{ position:fixed; inset:0; width:100%; background:#0c0a08; color:var(--onze-on-dark);
    font-family:var(--onze-font); -webkit-font-smoothing:antialiased; }

  header{ position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; gap:20px;
    padding:30px clamp(28px,5vw,64px); padding-top:calc(30px + env(safe-area-inset-top)); }
  header a{ display:flex; align-items:center; text-decoration:none; }
  header img{ height:40px; display:block; }
  #bar-federations{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; font-weight:600;
    color:var(--onze-on-dark-mute); }
  #bar-federations:hover{ color:var(--onze-accent); }

  .teaser{ position:fixed; inset:0; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; overflow:hidden; }
  .teaser video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.45; z-index:0; }
  .teaser::after{ content:""; position:absolute; inset:0; z-index:1;
    background:radial-gradient(ellipse at center, rgba(0,0,0,.30) 0%, rgba(0,0,0,.82) 80%); }
  .teaser img{ width:104px; height:auto; opacity:.95; position:relative; z-index:2; }
  .teaser-msg{ position:relative; z-index:2; display:flex; align-items:center; gap:12px; font-size:12px;
    letter-spacing:.24em; text-transform:uppercase; font-weight:700; color:var(--onze-on-dark-mute); }
  .teaser-msg::before{ content:""; width:26px; height:2px; background:var(--onze-accent); }
  .caret{ display:inline-block; width:2px; height:1.02em; background:var(--onze-accent); margin-left:2px; vertical-align:-.14em;
    box-shadow:0 0 8px rgba(255,31,107,.7); animation:blink 1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  @media (prefers-reduced-motion: reduce){ .teaser video{ display:none; } }
</style>
</head>
<body>

<header>
  <a href="index.html" aria-label="Back to ONZE"><img src="assets/brand/logo/horizontal/onze-horizontal-white.png" alt="ONZE Sports Management"></a>
  <a href="decks/seychelles/onze-seychelles-edit.html" id="bar-federations">Federations</a>
</header>

<div class="teaser">
  <video autoplay muted loop playsinline poster="assets/imagery/hero/video/ball-macro-poster.jpg" aria-hidden="true">
    <source src="assets/imagery/hero/video/ball-macro-loop.webm" type="video/webm">
    <source src="assets/imagery/hero/video/ball-macro-loop.mp4" type="video/mp4">
  </video>
  <img src="assets/brand/logo/icon/onze-icon-white.png" alt="ONZE">
  <div class="teaser-msg"><span id="teaserText"></span></div>
</div>

<script>
(function(){
  const teaserText = document.getElementById('teaserText');
  const teaserFull = 'Coming soon.';
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sleep = ms => new Promise(r=>setTimeout(r, ms));
  const delayFor = ch => { if('.!?'.includes(ch)) return 260; if(',;:—'.includes(ch)) return 130; return 30 + Math.random()*30; };
  const TYPO_AT = 5, TYPO_CHAR = 'h';   // "Comin" + stray "h" before correcting to "Coming"

  if(reduceMotion){ teaserText.textContent = teaserFull; return; }

  async function typeTeaser(){
    let shown = '';
    const render = () => { teaserText.innerHTML = esc(shown) + '<span class="caret"></span>'; };
    render();
    for(let i=0; i<teaserFull.length; i++){
      if(i === TYPO_AT){
        shown += TYPO_CHAR; render();
        await sleep(260);
        shown = shown.slice(0,-1);
        await sleep(90);
        render();
        await sleep(140);
      }
      shown += teaserFull[i]; render();
      await sleep(delayFor(teaserFull[i]));
    }
  }
  setTimeout(typeTeaser, 500);
})();
</script>

</body>
</html>
